# Dependabot will run on day 11 of each month at 01:04 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '4 1 11 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'bembelstemmer'
    versioning-strategy: 'increase'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '4 1 11 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'bembelstemmer'
